name: CI Success

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  checks: read
  statuses: read

jobs:
  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Wait for all PR checks to succeed
        uses: promptfoo/.github/.github/actions/ci-success@10fb60ee3167be1ffffaff46b0ad23ea66ab0d33 # main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          timeout-seconds: 300
